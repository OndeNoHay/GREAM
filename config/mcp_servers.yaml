servers:
- name: filesystem
  type: stdio
  command: npx
  args:
  - -y
  - '@modelcontextprotocol/server-filesystem'
  - C:/AI/GREAM/input
  - C:/AI/GREAM/output
  enabled: false
  timeout_seconds: 15
- name: document_loader
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.document_loader.server
  enabled: true
  timeout_seconds: 30
- name: s1000d_csdb
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.s1000d_csdb.server
  enabled: true
  timeout_seconds: 30
- name: playwright
  type: stdio
  command: npx
  args:
  - -y
  - '@playwright/mcp'
  - --headless
  enabled: false
  timeout_seconds: 60
- name: word_graem
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.word_graem.server
  enabled: true
  timeout_seconds: 30
- name: pptx_graem
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.pptx_graem.server
  enabled: true
  timeout_seconds: 30
- name: brex_validator
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.brex_validator.server
  enabled: true
  timeout_seconds: 45
- name: ste_checker
  type: stdio
  command: python
  args:
  - -m
  - mcp_servers.ste_checker.server
  enabled: true
  timeout_seconds: 60
